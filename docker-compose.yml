version: "3.9"

services:
  # ── TimescaleDB (PostgreSQL + time-series extension) ──────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: nse_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nse_options}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (event bus + hot cache) ─────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: nse_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nse_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Orchestrator Agent ──────────────────────────────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nse_orchestrator
    restart: unless-stopped
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m agents.orchestrator.agent

  # ── React Dashboard (dev) ────────────────────────────────────────────────
  dashboard:
    image: node:20-alpine
    container_name: nse_dashboard
    working_dir: /app
    volumes:
      - ./dashboard:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - api

volumes:
  timescale_data:
  redis_data:
